<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Latido Real - Suite</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@1,400;1,500&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #070708;
            --accent-gold: #d4af37;
            --heart-red: #ff3e3e;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.15);
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-dark);
            color: #e0e0e0; font-family: 'Lora', serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
            background: radial-gradient(circle at center, #1a0b0d 0%, #070708 100%);
            transition: background 0.8s ease;
        }

        /* Botón para volver a la Suite */
        .back-btn {
            position: fixed; top: 20px; left: 20px;
            color: var(--accent-gold); text-decoration: none;
            font-size: 0.9rem; font-family: sans-serif; letter-spacing: 1px;
            z-index: 50; opacity: 0.7; transition: opacity 0.3s;
            display: flex; align-items: center; gap: 5px;
        }

        body.latido-activo {
            background: radial-gradient(circle at center, #2d0f12 0%, #070708 100%);
        }

        .main-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 40px 30px;
            width: 85vw; max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            z-index: 10;
            transition: all 0.5s ease;
        }

        body.latido-activo .main-card {
            border-color: rgba(255, 62, 62, 0.3);
            transform: scale(0.98);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--accent-gold);
            font-size: 1.8rem; margin: 0;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .heart-container {
            position: relative;
            margin-top: 40px;
            display: flex; justify-content: center; align-items: center;
        }

        #heartbeat-btn {
            width: 100px; height: 100px;
            background: rgba(255, 62, 62, 0.05);
            border: 2px solid rgba(255, 62, 62, 0.2);
            color: var(--heart-red);
            border-radius: 50%;
            font-size: 3rem;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 5;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: none; /* Crucial para evitar scrolls accidentales */
        }

        /* ONDAS DE CHOQUE (RIPPLES) */
        .ripple {
            position: absolute; width: 100px; height: 100px;
            border: 2px solid var(--heart-red);
            border-radius: 50%; opacity: 0; pointer-events: none;
        }

        @keyframes lub-dub-visual {
            0% { transform: scale(1); opacity: 0; }
            10% { transform: scale(1.4); opacity: 0.5; }
            25% { transform: scale(1.2); opacity: 0.3; }
            35% { transform: scale(1.5); opacity: 0.4; }
            100% { transform: scale(2.2); opacity: 0; }
        }

        .pulsing-active {
            animation: lub-dub-visual 1.1s infinite;
        }

        #heartbeat-btn.active-state {
            background: var(--heart-red);
            color: white;
            box-shadow: 0 0 50px rgba(255, 62, 62, 0.5);
            transform: scale(1.1);
        }

        .instruction {
            font-size: 0.75rem; color: #888;
            margin-top: 30px; letter-spacing: 2px;
            text-transform: uppercase; display: block;
        }

        .message-sub {
            margin-top: 10px; font-size: 1rem; font-style: italic; color: #aaa; line-height: 1.6;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">❮ Menú</a>

    <div class="main-card">
        <h1>Latido Real</h1>
        <p class="message-sub">Pon tu mano aquí y siente cómo late mi corazón por ti ahora mismo.</p>
        
        <div class="heart-container">
            <div class="ripple" id="r1"></div>
            <div class="ripple" id="r2"></div>
            <div id="heartbeat-btn">❤</div>
        </div>

        <span class="instruction">Mantén presionado</span>
    </div>

    <script>
        const btn = document.getElementById('heartbeat-btn');
        const r1 = document.getElementById('r1');
        const r2 = document.getElementById('r2');
        let heartTimer;

        // Patrón de vibración intenso: Lub-Dub
        // 150ms golpe fuerte, 100ms pausa, 70ms golpe seco
        const pattern = [150, 100, 70];

        function ejecutarVibracion() {
            if (navigator.vibrate) {
                navigator.vibrate(pattern);
            }
        }

        function handleStart(e) {
            e.preventDefault();
            
            // 1. Activar UI
            document.body.classList.add('latido-activo');
            btn.classList.add('active-state');
            r1.classList.add('pulsing-active');
            
            setTimeout(() => {
                if(btn.classList.contains('active-state')) r2.classList.add('pulsing-active');
            }, 300);

            // 2. VIBRACIÓN INSTANTÁNEA (Para romper el bloqueo del primer click)
            ejecutarVibracion();

            // 3. Iniciar el loop
            clearInterval(heartTimer);
            heartTimer = setInterval(ejecutarVibracion, 1150);
        }

        function handleEnd(e) {
            e.preventDefault();
            
            // Limpiar UI
            document.body.classList.remove('latido-activo');
            btn.classList.remove('active-state');
            r1.classList.remove('pulsing-active');
            r2.classList.remove('pulsing-active');
            
            // Detener motor
            clearInterval(heartTimer);
            if (navigator.vibrate) {
                navigator.vibrate(0);
            }
        }

        // Eventos táctiles para el S21 (Mobile)
        btn.addEventListener('touchstart', handleStart, { passive: false });
        btn.addEventListener('touchend', handleEnd, { passive: false });
        btn.addEventListener('touchcancel', handleEnd, { passive: false });

        // Fallback para Mouse (PC)
        btn.addEventListener('mousedown', handleStart);
        btn.addEventListener('mouseup', handleEnd);
        btn.addEventListener('mouseleave', handleEnd);

    </script>
</body>
</html>
